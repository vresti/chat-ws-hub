<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #111B21;
      height: 100%;
      overflow: hidden;
      width: 100%;
    }
    
    .app-container {
      display: flex;
      height: 100vh;
      height: 100dvh;
      max-width: 1400px;
      margin: 0 auto;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }
    
    .sidebar {
      width: 380px;
      min-width: 380px;
      background: #111B21;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #2A3942;
      height: 100%;
    }
    
    .sidebar-header {
      background: #202C33;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    
    .sidebar-header-left { display: flex; align-items: center; gap: 8px; }
    .sidebar-title-block { display: flex; flex-direction: column; }
    .sidebar-title-row { display: flex; align-items: center; gap: 8px; }
    .sidebar-header h2 { color: #E9EDEF; font-size: 16px; font-weight: 500; }
    .sidebar-header .badge { border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 600; color: white; }
    .sidebar-empresa { color: #8696A0; font-size: 11px; margin-top: 2px; white-space: nowrap; }
    .sidebar-header-right { display: flex; align-items: center; gap: 4px; }
    
    .btn-sync, .btn-clean {
      background: none; border: 1px solid #2A3942; color: #8696A0; border-radius: 6px;
      padding: 4px 8px; font-size: 13px; cursor: pointer; transition: all 0.2s;
      min-width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    }
    .btn-sync:hover, .btn-clean:hover { background: #2A3942; color: #E9EDEF; }
    
    .search-box { padding: 8px 12px; background: #111B21; flex-shrink: 0; }
    .search-box input { width: 100%; padding: 8px 32px 8px 12px; border-radius: 8px; border: none; background: #202C33; color: #E9EDEF; font-size: 14px; outline: none; }
    .search-box input::placeholder { color: #8696A0; }
    
    .contacts-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; scrollbar-width: thin; scrollbar-color: #374045 transparent; }
    .contacts-list::-webkit-scrollbar { width: 6px; }
    .contacts-list::-webkit-scrollbar-thumb { background: #374045; border-radius: 3px; }
    
    .contact-item { display: flex; align-items: center; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #202C33; transition: background 0.15s; }
    .contact-item:hover { background: #202C33; }
    .contact-item.active { background: #2A3942; }
    
    .contact-avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; font-weight: 600; margin-right: 12px; flex-shrink: 0; }
    .contact-info { flex: 1; min-width: 0; }
    .contact-name { color: #E9EDEF; font-size: 15px; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .contact-last-msg { color: #8696A0; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    
    .contact-meta { text-align: right; flex-shrink: 0; margin-left: 8px; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .contact-time { color: #8696A0; font-size: 12px; }
    .contact-meta-row { display: flex; align-items: center; gap: 5px; }
    .contact-count { color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }
    
    .contact-new { width: 10px; height: 10px; border-radius: 50%; background: #FF3B30; flex-shrink: 0; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    
    .btn-archive, .btn-pin { background: none; border: none; color: #8696A0; font-size: 14px; cursor: pointer; padding: 2px; border-radius: 4px; transition: all 0.2s; line-height: 1; }
    .btn-archive:hover, .btn-pin:hover { color: #00A884; }
    .btn-pin-active { color: #E67E22 !important; }
    
    .chat-panel { flex: 1; display: flex; flex-direction: column; background: #0B141A; height: 100%; overflow: hidden; }
    
    .chat-header { background: #202C33; padding: 10px 16px; display: flex; align-items: center; height: 60px; border-bottom: 1px solid #2A3942; flex-shrink: 0; }
    .chat-header .contact-avatar { width: 40px; height: 40px; font-size: 16px; }
    .chat-header-info { flex: 1; }
    .chat-header-name { color: #E9EDEF; font-size: 16px; font-weight: 500; }
    .chat-header-status { color: #8696A0; font-size: 13px; }
    .chat-header-phone { color: #00A884; font-size: 13px; font-weight: 500; margin-left: 12px; }
    
    .chat-messages {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 20px 60px;
      background-color: #0B141A;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23182229' fill-opacity='0.6'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      scrollbar-width: thin; scrollbar-color: #374045 transparent; min-height: 0;
    }
    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #374045; border-radius: 3px; }
    
    .welcome-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #222E35; }
    .welcome-icon { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 20px; }
    .welcome-screen h2 { color: #E9EDEF; font-size: 28px; font-weight: 300; margin-bottom: 10px; }
    .welcome-screen p { color: #8696A0; font-size: 14px; text-align: center; max-width: 400px; line-height: 1.5; }
    
    .date-separator { text-align: center; margin: 16px 0; }
    .date-separator span { background: #182229; color: #8696A0; padding: 5px 12px; border-radius: 8px; font-size: 12px; box-shadow: 0 1px 1px rgba(0,0,0,0.2); }
    
    .message-bubble { max-width: 65%; padding: 6px 8px 6px 9px; margin-bottom: 3px; border-radius: 8px; position: relative; word-wrap: break-word; line-height: 1.4; clear: both; }
    .message-incoming { background: #202C33; float: left; border-top-left-radius: 0; }
    .message-outgoing { background: #005C4B; float: right; border-top-right-radius: 0; }
    .message-text { color: #E9EDEF; font-size: 14px; }
    .message-time { color: #8696A0; font-size: 11px; float: right; margin-left: 12px; margin-top: 4px; }
    .message-outgoing .message-time { color: #99BEB7; }
    .message-app { font-size: 11px; font-weight: 600; margin-bottom: 2px; }
    
    .message-header-row { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
    .message-header-row .message-app { margin-bottom: 0; display: inline; }
    .message-header-row .message-time { float: none; margin: 0; }
    .message-header-row .btn-save-response { margin-top: 0; }
    
    .message-response { background: #1A3A2A; border-left: 3px solid #00A884; padding: 6px 10px; margin-top: 4px; border-radius: 4px; font-size: 13px; color: #82E0AA; }
    .message-response-label { font-size: 11px; color: #00A884; font-weight: 600; margin-bottom: 2px; }
    .message-response-ia { background: #2A1A3A; border-left: 3px solid #7C3AED; padding: 6px 10px; margin-top: 4px; border-radius: 4px; font-size: 13px; color: #C4A8E0; }
    .message-response-ia-label { font-size: 11px; color: #7C3AED; font-weight: 600; margin-bottom: 2px; }
    
    /* ── MEDIA ── */
    .media-placeholder { color: #8696A0; font-size: 13px; padding: 6px 2px; display: flex; align-items: center; gap: 6px; }
    .media-audio audio { max-width: 240px; width: 100%; border-radius: 8px; margin: 4px 0; display: block; }
    .media-imagen img { max-width: 240px; border-radius: 8px; cursor: pointer; margin: 4px 0; display: block; }
    .media-doc a { color: #00A884; text-decoration: none; display: flex; align-items: center; gap: 6px; font-size: 13px; padding: 4px 0; }
    .media-doc a:hover { text-decoration: underline; }
    
    .clearfix { clear: both; }
    
    .chat-input-area { background: #202C33; padding: 8px 10px; display: flex; align-items: center; gap: 6px; flex-shrink: 0; position: relative; }
    .chat-input { flex: 1; padding: 10px 14px; border-radius: 8px; border: none; background: #2A3942; color: #E9EDEF; font-size: 14px; outline: none; font-family: inherit; min-width: 0; }
    .chat-input::placeholder { color: #8696A0; }
    
    .btn-send { width: 40px; height: 40px; border-radius: 50%; border: none; background: #00A884; color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; flex-shrink: 0; }
    .btn-send:hover { background: #02B898; }
    .btn-send:disabled { background: #2A3942; cursor: not-allowed; }
    
    .btn-suggestion { padding: 6px 12px; border-radius: 16px; border: 1px solid #00A884; background: transparent; color: #00A884; font-size: 12px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .btn-suggestion:hover { background: #00A884; color: white; }
    
    .suggestions-bar { background: #202C33; padding: 6px 16px; display: flex; gap: 8px; overflow-x: auto; border-top: 1px solid #2A3942; flex-shrink: 0; }
    .suggestions-bar:empty { display: none; padding: 0; }
    
    .btn-save-response { background: none; border: 1px solid #c9a227; color: #c9a227; border-radius: 6px; padding: 2px 6px; font-size: 10px; cursor: pointer; transition: all 0.2s; }
    .btn-save-response:hover { background: #c9a227; color: #111B21; }
    
    .loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: #8696A0; font-size: 14px; }
    .spinner { width: 24px; height: 24px; border: 3px solid #2A3942; border-top-color: #00A884; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-box { background: #202C33; border-radius: 12px; padding: 24px; max-width: 420px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    .modal-title { color: #E9EDEF; font-size: 16px; font-weight: 500; margin-bottom: 8px; }
    .modal-subtitle { color: #8696A0; font-size: 13px; margin-bottom: 16px; line-height: 1.4; }
    .modal-input { width: 100%; padding: 10px 14px; border-radius: 8px; border: none; background: #2A3942; color: #E9EDEF; font-size: 14px; outline: none; font-family: inherit; margin-bottom: 16px; }
    .modal-input::placeholder { color: #8696A0; }
    .modal-buttons { display: flex; justify-content: flex-end; gap: 10px; }
    .modal-btn { padding: 8px 20px; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; font-family: inherit; transition: all 0.2s; }
    .modal-btn-cancel { background: none; color: #8696A0; }
    .modal-btn-cancel:hover { color: #E9EDEF; }
    .modal-btn-ok { background: #00A884; color: white; }
    .modal-btn-ok:hover { background: #02B898; }
    .modal-btn-danger { background: #E74C3C; color: white; }
    .modal-btn-danger:hover { background: #C0392B; }
    
    .toast-notification { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 1001; box-shadow: 0 4px 16px rgba(0,0,0,0.3); animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards; }
    @keyframes toastIn { from { opacity: 0; top: 0; } to { opacity: 1; top: 20px; } }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }
    
    .contactos-panel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #202C33; border-radius: 12px; width: 350px; max-height: 500px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 1001; display: flex; flex-direction: column; }
    .contactos-panel-header { padding: 16px; border-bottom: 1px solid #2A3942; }
    .contactos-panel-title { color: #E9EDEF; font-size: 16px; font-weight: 500; margin-bottom: 10px; }
    .contactos-panel-search { width: 100%; padding: 8px 12px; border-radius: 8px; border: none; background: #2A3942; color: #E9EDEF; font-size: 14px; outline: none; }
    .contactos-panel-search::placeholder { color: #8696A0; }
    .contactos-panel-list { flex: 1; overflow-y: auto; max-height: 380px; }
    .contactos-panel-item { padding: 12px 16px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: background 0.15s; }
    .contactos-panel-item:hover { background: #2A3942; }
    .contactos-panel-nombre { color: #E9EDEF; font-size: 14px; }
    .contactos-panel-tel { color: #8696A0; font-size: 12px; }
    .contactos-panel-sin-tel { color: #E74C3C; font-size: 12px; }
    .contactos-panel-close { position: absolute; top: 12px; right: 12px; background: none; border: none; color: #8696A0; font-size: 20px; cursor: pointer; }
    .contactos-panel-close:hover { color: #E9EDEF; }
    
    @media (max-width: 768px) {
      .sidebar { width: 100%; min-width: 100%; }
      .chat-panel { display: none; }
      .app-container.chat-open .sidebar { display: none; }
      .app-container.chat-open .chat-panel { display: flex; }
      .btn-back { display: flex !important; }
      
      .sidebar-header { height: auto; padding: 4px 8px; flex-wrap: wrap; }
      .sidebar-header-left { width: 100%; justify-content: space-between; }
      .sidebar-title-row { gap: 4px; }
      .sidebar-header h2 { font-size: 15px; }
      .sidebar-header .badge { font-size: 10px; padding: 1px 6px; }
      .sidebar-empresa { font-size: 9px; }
      .sidebar-header-right { position: absolute; right: 8px; top: 4px; gap: 2px; }
      .sidebar-title-block { max-width: 55%; }
      .btn-sync, .btn-clean { min-width: 26px; height: 26px; font-size: 10px; padding: 2px 4px; }
      
      .search-box { padding: 4px 8px; }
      .search-box input { font-size: 15px; padding: 8px 12px; }
      
      .contact-item { padding: 8px 12px; min-height: 56px; }
      .contact-avatar { width: 38px; height: 38px; font-size: 16px; margin-right: 10px; }
      .contact-name { font-size: 15px; }
      .contact-last-msg { font-size: 12px; margin-top: 2px; }
      .contact-time { font-size: 11px; }
      .contact-count { width: 18px; height: 18px; font-size: 10px; }
      .btn-archive, .btn-pin { font-size: 12px; }
      
      .chat-header { height: 42px; padding: 2px 4px; gap: 4px; }
      .chat-header-name { font-size: 13px; }
      .chat-header-status { font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .chat-header-phone { font-size: 10px; margin-left: 6px; }
      .chat-header .contact-avatar { width: 28px; height: 28px; font-size: 12px; margin-right: 4px; }
      .chat-header-info { min-width: 0; }
      .btn-back { width: 24px; height: 24px; font-size: 16px; margin-right: 0px; margin-left: -2px; }
      
      .chat-messages { padding: 6px 6px; }
      .message-bubble { max-width: 90%; padding: 4px 6px 4px 7px; margin-bottom: 2px; }
      .message-text { font-size: 13px; }
      .message-time { font-size: 10px; margin-top: 2px; }
      .message-app { font-size: 10px; }
      .message-header-row { gap: 4px; }
      .message-response { font-size: 12px; padding: 4px 8px; margin-top: 3px; }
      .message-response-ia { font-size: 12px; padding: 4px 8px; margin-top: 3px; }
      .message-response-label { font-size: 9px; }
      .message-response-ia-label { font-size: 9px; }
      .date-separator span { font-size: 11px; }
      .btn-save-response { font-size: 9px; padding: 1px 4px; }
      
      .chat-input-area { flex-wrap: wrap; padding: 6px 8px; gap: 4px; }
      .chat-input { width: 100%; flex: none; font-size: 15px; padding: 8px 10px; order: 1; }
      .btn-send { width: 32px; height: 32px; font-size: 14px; order: 2; flex: 1; }
      
      .suggestions-bar { padding: 4px 8px; }
      .btn-suggestion { font-size: 11px; padding: 4px 10px; }
      
      .welcome-screen h2 { font-size: 22px; }
      .welcome-screen p { font-size: 14px; }
      
      .media-audio audio { max-width: 100%; }
      .media-imagen img { max-width: 180px; }
      
      .contactos-panel { width: 90%; max-height: 80vh; }
      .contactos-panel-header { padding: 10px 12px; }
      .contactos-panel-title { font-size: 14px; margin-bottom: 8px; }
      .contactos-panel-search { font-size: 14px; padding: 6px 10px; }
      .contactos-panel-item { padding: 8px 12px; }
      .contactos-panel-nombre { font-size: 13px; }
      .contactos-panel-tel { font-size: 11px; }
      .contactos-panel-list { max-height: 60vh; }
    }
    
    .btn-back {
      display: none; width: 36px; height: 36px; border: none; background: none; color: #E9EDEF;
      font-size: 22px; cursor: pointer; margin-right: 4px; align-items: center; justify-content: center; flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="app-container" id="appContainer">
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-header-left">
          <div class="sidebar-title-block">
            <div class="sidebar-title-row">
              <h2>💬 Chats</h2>
              <span class="badge" id="totalContactos">0</span>
            </div>
            <div class="sidebar-empresa" id="empresaInfo"></div>
          </div>
        </div>
        <div class="sidebar-header-right">
          <button class="btn-clean" id="btnClean" onclick="limpiarHistorial()">🧹</button>
          <button class="btn-sync" id="btnSync" onclick="sincTelefonos()">📱</button>
          <button class="btn-sync" onclick="mostrarContactosNuevo()">C</button>
          <button class="btn-sync" id="btnAutoIA" onclick="toggleAutoIA()">🤖</button>
        </div>
      </div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscar contacto..." oninput="filtrarContactos()">
      </div>
      <div class="contacts-list" id="contactsList">
        <div class="loading"><div class="spinner"></div>Cargando contactos...</div>
      </div>
    </div>
    
    <div class="chat-panel" id="chatPanel">
      <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-icon" id="welcomeIcon">💬</div>
        <h2 id="welcomeTitle">Chat de Notificaciones</h2>
        <p>Seleccioná un contacto para ver el historial de mensajes y enviar respuestas por WhatsApp</p>
      </div>
      
      <div id="activeChat" style="display:none; flex-direction:column; flex:1; overflow:hidden; min-height:0;">
        <div class="chat-header">
          <button class="btn-back" onclick="volverAContactos()">←</button>
          <div class="contact-avatar" id="chatAvatar">V</div>
          <div class="chat-header-info">
            <div class="chat-header-name" id="chatName">Contacto</div>
            <div class="chat-header-status" id="chatStatus">mensajes</div>
          </div>
          <div class="chat-header-phone" id="chatPhone"></div>
        </div>
        
        <div class="chat-messages" id="chatMessages"></div>
        <div class="suggestions-bar" id="suggestionsBar"></div>
        
        <div class="chat-input-area">
          <input type="file" id="fileInput" style="display:none" onchange="enviarArchivo(this)">
          <input type="text" class="chat-input" id="messageInput" placeholder="Mensaje..." onkeypress="if(event.key==='Enter') enviarMensaje()">
          <button class="btn-send" id="btnSend" onclick="enviarMensaje()">➤</button>
          <button class="btn-send" style="background:#E67E22;font-size:16px;" onclick="document.getElementById('fileInput').click()" title="Enviar archivo">📎</button>
          <button class="btn-send" style="background:#7C3AED;font-size:11px;" id="btnIA" onclick="pedirIA()">IA</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    var API_URL = "https://script.google.com/macros/s/AKfycbxLCyafHzG5GIHxQuo2SVUoQ4gfJOYsdvdmbXIizWOl13OJ6Mmia7Vy6Jax1kkj7OKXDQ/exec";
    var BRIDGE_URL = "https://bridge.tasks-on.com";
    
    function api(action, params) {
      var url = API_URL + "?action=" + action;
      if (params) { Object.keys(params).forEach(function(key) { url += "&" + key + "=" + encodeURIComponent(params[key]); }); }
      return fetch(url).then(function(r) { return r.json(); });
    }
    
    var contactosGlobal = [], contactoActual = "", telefonoActual = "", timestampActual = 0;
    var mostrarArchivados = false, mensajesVistos = {}, appColor = "#00A884", configData = {}, autoIAactivo = false;
    var mediaCache = {}; // Cache de archivos ya cargados { fileId: { base64, mimetype, filename } }
    
    api("getConfig").then(function(cfg) {
      configData = cfg; appColor = cfg.color || "#00A884";
      document.getElementById('empresaInfo').textContent = cfg.empresa + (cfg.telefono ? ' • ' + cfg.telefono : '');
      document.getElementById('welcomeTitle').textContent = cfg.empresa || 'Chat de Notificaciones';
      document.querySelectorAll('.badge').forEach(function(el) { el.style.background = appColor; });
      document.getElementById('welcomeIcon').style.background = appColor;
      document.getElementById('btnSend').style.background = appColor;
      api("getAutoIA").then(function(val) {
        autoIAactivo = val;
        if (autoIAactivo) { var b = document.getElementById('btnAutoIA'); b.style.background = '#7C3AED'; b.style.color = 'white'; b.style.borderColor = '#7C3AED'; }
      });
    });
    
    api("getContactos").then(function(data) { contactosGlobal = data; renderContactos(data); })
    .catch(function() { document.getElementById('contactsList').innerHTML = '<div class="loading" style="color:#ff6b6b;">Error</div>'; });
    
    // Formatea el último mensaje para media
    function formatUltimoMensaje(msg) {
      if (!msg) return '';
      if (msg.indexOf('[audio:') === 0) return '🎵 Audio';
      if (msg.indexOf('[imagen:') === 0) return '🖼️ Imagen';
      if (msg.indexOf('[video:') === 0) return '🎬 Video';
      if (msg.indexOf('[doc:') === 0) return '📄 Documento';
      if (msg.indexOf('[📎') === 0) return msg;
      return msg;
    }
    
    function renderContactos(contactos) {
      var html = '', totalActivos = 0;
      contactos.forEach(function(c) {
        if (c.archivado) return;
        totalActivos++;
        var esNuevo = false;
        if (mensajesVistos[c.nombre] !== undefined && c.totalMensajes > mensajesVistos[c.nombre]) esNuevo = true;
        if (mensajesVistos[c.nombre] === undefined) mensajesVistos[c.nombre] = c.totalMensajes;
        var inicial = (c.alias || c.nombre).charAt(0).toUpperCase();
        var colors = ['#00A884','#25D366','#128C7E','#075E54','#34B7F1','#ECE5DD'];
        var color = colors[c.nombre.length % colors.length];
        var esc = c.nombre.replace(/'/g, "\\'");
        html += '<div class="contact-item">' +
          '<div class="contact-avatar" style="background:' + color + '" onclick="abrirChat(\'' + esc + '\')">' + inicial + '</div>' +
          '<div class="contact-info" onclick="abrirChat(\'' + esc + '\')">' +
            '<div class="contact-name">' + (c.alias || c.nombre) + '</div>' +
            '<div class="contact-last-msg">' + formatUltimoMensaje(c.ultimoMensaje) + '</div></div>' +
          '<div class="contact-meta"><div class="contact-time">' + c.ultimaFecha + '</div>' +
            '<div class="contact-meta-row">' +
              '<div class="contact-count" style="background:' + appColor + '">' + c.totalMensajes + '</div>' +
              (esNuevo ? '<div class="contact-new"></div>' : '') +
              '<button class="' + (c.fijado ? 'btn-pin btn-pin-active' : 'btn-pin') + '" onclick="togglePin(\'' + esc + '\')">' + (c.fijado ? '📌' : '📍') + '</button>' +
            '</div></div></div>';
      });
      document.getElementById('contactsList').innerHTML = html || '<div class="loading">No hay contactos</div>';
      document.getElementById('totalContactos').textContent = totalActivos;
      document.getElementById('totalContactos').style.background = appColor;
    }
    
    function filtrarContactos() {
      var f = document.getElementById('searchInput').value.toLowerCase();
      renderContactos(contactosGlobal.filter(function(c) { return c.nombre.toLowerCase().indexOf(f) > -1 || c.alias.toLowerCase().indexOf(f) > -1; }));
    }
    
    function togglePin(contacto) {
      event.stopPropagation();
      var c = contactosGlobal.find(function(x) { return x.nombre === contacto; });
      if (c) api(c.fijado ? "desfijarContacto" : "fijarContacto", { contacto: contacto }).then(recargarContactos);
    }
    
    function limpiarHistorial() {
      var n = contactosGlobal.filter(function(c) { return c.fijado; }).length;
      var o = document.createElement('div'); o.className = 'modal-overlay';
      o.innerHTML = '<div class="modal-box"><div class="modal-title">🧹 Limpiar historial</div><div class="modal-subtitle">Se borrarán todas excepto las ' + n + ' fijadas.<br><br>No se puede deshacer.</div><div class="modal-buttons"><button class="modal-btn modal-btn-cancel" onclick="cerrarModal()">Cancelar</button><button class="modal-btn modal-btn-danger" onclick="confirmarLimpiar()">Limpiar</button></div></div>';
      document.body.appendChild(o);
    }
    function confirmarLimpiar() { cerrarModal(); mostrarToast('🧹 Limpiando...'); api("limpiarHistorial").then(function(r) { mostrarToast('✓ Limpio. ' + r.fijados + ' fijadas.'); recargarContactos(); }); }
    function recargarContactos() { api("getContactos").then(function(d) { contactosGlobal = d; renderContactos(d); }); }
    
    function abrirChat(contacto) {
      contactoActual = contacto;
      document.querySelectorAll('.contact-item').forEach(function(el) { el.classList.remove('active'); });
      document.getElementById('welcomeScreen').style.display = 'none';
      document.getElementById('activeChat').style.display = 'flex';
      document.getElementById('appContainer').classList.add('chat-open');
      var c = contactosGlobal.find(function(x) { return x.nombre === contacto; });
      if (c) {
        document.getElementById('chatName').textContent = c.alias || c.nombre;
        document.getElementById('chatAvatar').textContent = (c.alias || c.nombre).charAt(0).toUpperCase();
        var _c = ['#00A884','#25D366','#128C7E','#075E54','#34B7F1','#ECE5DD'];
        document.getElementById('chatAvatar').style.background = _c[c.nombre.length % _c.length];
        document.getElementById('chatStatus').textContent = c.totalMensajes + ' mensajes';
        telefonoActual = c.telefono; timestampActual = c.timestamp || 0;
        document.getElementById('chatPhone').textContent = c.telefono || 'Sin tel';
        mensajesVistos[contacto] = c.totalMensajes; renderContactos(contactosGlobal);
      }
      document.getElementById('chatMessages').innerHTML = '<div class="loading"><div class="spinner"></div>Cargando...</div>';
      document.getElementById('suggestionsBar').innerHTML = '';
      api("getMensajesPorContacto", { contacto: contacto }).then(renderMensajes);
    }
    
    // ── Detecta si un texto es un mensaje de media y devuelve el HTML apropiado ──
    function renderContenidoMensaje(texto) {
      var mediaMatch = texto.match(/^\[(audio|imagen|video|doc):([^\]]+)\]$/);
      if (!mediaMatch) return '<div class="message-text">' + texto + '</div>';
      
      var tipo = mediaMatch[1];
      var fileId = mediaMatch[2];
      var icons = { audio: '🎵', imagen: '🖼️', video: '🎬', doc: '📄' };
      
      // Si ya está en cache, renderizar directo
      if (mediaCache[fileId]) {
        return renderMediaHtml(tipo, fileId, mediaCache[fileId]);
      }
      
      // Placeholder con data attributes para carga async
      return '<div class="media-placeholder" data-fileid="' + fileId + '" data-mediatype="' + tipo + '">'
        + icons[tipo] + ' Cargando...</div>';
    }
    
    function renderMediaHtml(tipo, fileId, cacheData) {
      var src = 'data:' + cacheData.mimetype + ';base64,' + cacheData.base64;
      if (tipo === 'audio') {
        return '<div class="media-audio"><audio controls src="' + src + '"></audio></div>';
      } else if (tipo === 'imagen') {
        return '<div class="media-imagen"><img src="' + src + '" onclick="window.open(this.src)" title="Click para ampliar"></div>';
      } else if (tipo === 'video') {
        return '<div class="media-audio"><video controls src="' + src + '" style="max-width:240px;border-radius:8px;"></video></div>';
      } else {
        return '<div class="media-doc"><a href="' + src + '" download="' + (cacheData.filename || 'archivo') + '">📄 ' + (cacheData.filename || 'Descargar documento') + '</a></div>';
      }
    }
    
    // ── Carga los placeholders de media async ──
    function cargarMediaPendiente() {
      var placeholders = document.querySelectorAll('.media-placeholder');
      placeholders.forEach(function(el) {
        var fileId = el.getAttribute('data-fileid');
        var tipo = el.getAttribute('data-mediatype');
        if (!fileId) return;
        if (mediaCache[fileId]) {
          el.outerHTML = renderMediaHtml(tipo, fileId, mediaCache[fileId]);
          return;
        }
        api('getMedia', { fileId: fileId }).then(function(data) {
          if (data.status === 'ok') {
            mediaCache[fileId] = data;
            var current = document.querySelector('[data-fileid="' + fileId + '"]');
            if (current) current.outerHTML = renderMediaHtml(tipo, fileId, data);
          } else {
            var current = document.querySelector('[data-fileid="' + fileId + '"]');
            if (current) current.textContent = '⚠️ No se pudo cargar el archivo';
          }
        }).catch(function() {
          var current = document.querySelector('[data-fileid="' + fileId + '"]');
          if (current) current.textContent = '⚠️ Error de conexión';
        });
      });
    }
    
    function renderMensajes(mensajes) {
      var container = document.getElementById('chatMessages'), html = '', fechaAnt = '', sug = {}, tr = [];
      mensajes.forEach(function(m, idx) {
        var fechaDia = m.fecha.split(' ')[0];
        if (fechaDia !== fechaAnt) { html += '<div class="clearfix"></div><div class="date-separator"><span>' + fechaDia + '</span></div>'; fechaAnt = fechaDia; }
        var hora = m.fecha.split(' ')[1], esEnv = m.mensaje.indexOf('→ ') === 0;
        if (esEnv) {
          var ind = '', p = m.fecha.split(' '), fp = p[0].split('/'), hp = p[1].split(':');
          var fe = new Date(fp[2], fp[1]-1, fp[0], hp[0], hp[1]);
          for (var k = idx-1; k >= 0; k--) {
            if (mensajes[k].mensaje.indexOf('→ ') !== 0) {
              var pr = mensajes[k].fecha.split(' '), fr = pr[0].split('/'), hr = pr[1].split(':');
              var frc = new Date(fr[2], fr[1]-1, fr[0], hr[0], hr[1]);
              var dm = Math.round((fe - frc) / 60000);
              if (dm >= 0 && dm < 1440) {
                var tb = configData.tiempoBien||5, tg = configData.tiempoRegular||15;
                ind = ' ' + (dm <= tb ? (configData.textoBien||'✅') : dm <= tg ? (configData.textoRegular||'⚠️') : (configData.textoMalo||'🔴')) + ' ' + dm + 'm';
                tr.push(dm);
              } break;
            }
          }
          var textoEnv = m.mensaje.substring(2);
          html += '<div class="message-bubble message-outgoing">' + renderContenidoMensaje(textoEnv) + '<div class="message-time">' + hora + ' ✓' + ind + '</div></div><div class="clearfix"></div>';
        } else {
          var esMedia = /^\[(audio|imagen|video|doc):/.test(m.mensaje);
          html += '<div class="message-bubble message-incoming"><div class="message-header-row">' +
            '<span class="message-app" style="color:' + appColor + '">' + m.app + '</span>' +
            '<span class="message-time">' + hora + '</span>' +
            (!m.respuestaPropuesta && !esMedia ? '<button class="btn-save-response" onclick="prepararGuardar(\'' + m.mensaje.replace(/'/g, "\\'").replace(/"/g, '&quot;') + '\')">💾</button>' : '') +
            '</div>' + renderContenidoMensaje(m.mensaje);
          if (m.respuestaPropuesta) {
            var esIA = m.respuestaPropuesta.indexOf('🤖') === 0;
            var txt = esIA ? m.respuestaPropuesta.substring(2).trim() : m.respuestaPropuesta;
            html += esIA ? '<div class="message-response-ia"><div class="message-response-ia-label">🤖 IA automática</div>' + txt + '</div>'
                        : '<div class="message-response"><div class="message-response-label">💡 Propuesta</div>' + txt + '</div>';
            sug[m.respuestaPropuesta] = true;
          }
          html += '</div><div class="clearfix"></div>';
        }
      });
      container.innerHTML = html || '<div class="loading">No hay mensajes</div>';
      setTimeout(function() { container.scrollTop = container.scrollHeight; }, 100);
      // Cargar media pendiente después del render
      setTimeout(cargarMediaPendiente, 50);
      if (tr.length > 0) {
        var prom = Math.round(tr.reduce(function(a,b){return a+b;},0) / tr.length);
        var tb = configData.tiempoBien||5, tg = configData.tiempoRegular||15;
        var ip = prom <= tb ? (configData.textoBien||'✅') : prom <= tg ? (configData.textoRegular||'⚠️') : (configData.textoMalo||'🔴');
        document.getElementById('chatStatus').textContent = mensajes.length + ' msgs · Resp: ' + prom + 'm ' + ip;
      }
      var sh = '';
      Object.keys(sug).slice(-3).forEach(function(s) { sh += '<button class="btn-suggestion" onclick="usarSugerencia(\'' + s.replace(/'/g, "\\'") + '\')">' + s.substring(0,30) + (s.length>30?'...':'') + '</button>'; });
      document.getElementById('suggestionsBar').innerHTML = sh;
    }
    
    function usarSugerencia(t) { document.getElementById('messageInput').value = t; document.getElementById('messageInput').focus(); }
    
    function enviarMensaje() {
      var inp = document.getElementById('messageInput'), msg = inp.value.trim();
      if (!msg || !contactoActual) return;
      var ct = document.getElementById('chatMessages'), ah = new Date();
      var hr = ah.getHours().toString().padStart(2,'0') + ':' + ah.getMinutes().toString().padStart(2,'0');
      var d = document.createElement('div');
      d.innerHTML = '<div class="message-bubble message-outgoing"><div class="message-text">' + msg + '</div><div class="message-time">' + hr + ' ⏳</div></div><div class="clearfix"></div>';
      ct.appendChild(d); ct.scrollTop = ct.scrollHeight; inp.value = '';
      api("guardarRespuestaEnviada", { contacto: contactoActual, mensaje: msg }).then(function(r) {
        var bs = ct.querySelectorAll('.message-outgoing'), u = bs[bs.length-1];
        if (u) { var t = u.querySelector('.message-time'); if (t) t.textContent = hr + ' ✓ vía ' + r.app; }
      });
      mensajesVistos[contactoActual] = (mensajesVistos[contactoActual]||0) + 1;
    }
    
    // ── Enviar archivo al bridge ──
    function enviarArchivo(input) {
      var file = input.files[0];
      if (!file) return;
      if (!contactoActual || !telefonoActual) {
        mostrarToast('⚠️ Sin teléfono para este contacto');
        input.value = '';
        return;
      }
      var maxMB = 16;
      if (file.size > maxMB * 1024 * 1024) {
        mostrarToast('⚠️ Archivo demasiado grande (máx ' + maxMB + 'MB)');
        input.value = '';
        return;
      }
      mostrarToast('📎 Preparando ' + file.name + '...');
      var reader = new FileReader();
      reader.onload = function(e) {
        var base64 = e.target.result.split(',')[1];
        fetch(BRIDGE_URL + '/enviar-archivo', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contacto: contactoActual,
            telefono: telefonoActual,
            base64: base64,
            mimetype: file.type || 'application/octet-stream',
            filename: file.name
          })
        }).then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.status === 'ok') {
            mostrarToast('✓ ' + file.name + ' enviado');
            // Mostrar burbuja de confirmación en el chat
            var ct = document.getElementById('chatMessages');
            var ah = new Date();
            var hr = ah.getHours().toString().padStart(2,'0') + ':' + ah.getMinutes().toString().padStart(2,'0');
            var d = document.createElement('div');
            d.innerHTML = '<div class="message-bubble message-outgoing"><div class="media-doc"><span style="color:#99BEB7;">📎 ' + file.name + '</span></div><div class="message-time">' + hr + ' ✓</div></div><div class="clearfix"></div>';
            ct.appendChild(d); ct.scrollTop = ct.scrollHeight;
          } else {
            mostrarToast('❌ Error: ' + (data.mensaje || 'no se pudo enviar'));
          }
          input.value = '';
        }).catch(function() {
          mostrarToast('❌ No se pudo conectar con el bridge');
          input.value = '';
        });
      };
      reader.onerror = function() { mostrarToast('❌ Error leyendo el archivo'); input.value = ''; };
      reader.readAsDataURL(file);
    }
    
    function pedirIA() {
      if (!contactoActual) return;
      var btn = document.getElementById('btnIA'); btn.textContent = '⏳'; btn.disabled = true;
      var bs = document.querySelectorAll('#chatMessages .message-bubble'), ul = [], tot = bs.length, ini = Math.max(0,tot-6);
      for (var i=ini; i<tot; i++) { var t = bs[i].querySelector('.message-text'); if (t) ul.push(bs[i].classList.contains('message-outgoing') ? '→ '+t.textContent : t.textContent); }
      api("sugerirRespuestaIA", { contacto: contactoActual, mensajes: JSON.stringify(ul) }).then(function(r) {
        btn.textContent = 'IA'; btn.disabled = false;
        if (r.status==='ok') { document.getElementById('messageInput').value = r.respuesta; document.getElementById('messageInput').focus(); }
        else mostrarToast('Error IA: ' + r.respuesta);
      }).catch(function() { btn.textContent = 'IA'; btn.disabled = false; mostrarToast('Error conexión'); });
    }
    
    var mensajeParaGuardar = "";
    function mostrarToast(txt) { var t = document.createElement('div'); t.className='toast-notification'; t.style.background=appColor; t.textContent=txt; document.body.appendChild(t); setTimeout(function(){t.remove();},3000); }
    
    function prepararGuardar(msg) {
      mensajeParaGuardar = msg;
      var o = document.createElement('div'); o.className = 'modal-overlay';
      o.innerHTML = '<div class="modal-box"><div class="modal-title">💾 Guardar respuesta</div><div class="modal-subtitle">"' + msg.substring(0,80) + (msg.length>80?'...':'') + '"</div><input type="text" class="modal-input" id="modalInput" placeholder="Respuesta modelo..."><div class="modal-buttons"><button class="modal-btn modal-btn-cancel" onclick="cerrarModal()">Cancelar</button><button class="modal-btn modal-btn-ok" onclick="confirmarGuardar()">Guardar</button></div></div>';
      document.body.appendChild(o); document.getElementById('modalInput').focus();
      document.getElementById('modalInput').addEventListener('keypress', function(e) { if (e.key==='Enter') confirmarGuardar(); });
    }
    function confirmarGuardar() { var i=document.getElementById('modalInput'), r=i?i.value.trim():''; cerrarModal(); if(r) api("guardarRespuestaModelo",{mensaje:mensajeParaGuardar,respuesta:r}).then(function(x){mostrarToast('✓ Guardada ('+x.status+')');}); }
    function cerrarModal() { var o=document.querySelector('.modal-overlay'); if(o) o.remove(); }
    
    var todosContactosCache = null;
    function mostrarContactosNuevo() {
      var o=document.querySelector('.modal-overlay'); if(o){o.remove();return;}
      o=document.createElement('div'); o.className='modal-overlay';
      o.innerHTML='<div class="contactos-panel"><button class="contactos-panel-close" onclick="cerrarModal()">✕</button><div class="contactos-panel-header"><div class="contactos-panel-title">📞 Iniciar conversación</div><input type="text" class="contactos-panel-search" id="buscarContactoNuevo" placeholder="Buscar..." oninput="filtrarContactosNuevo()"></div><div class="contactos-panel-list" id="listaContactosNuevo"><div class="loading"><div class="spinner"></div>Cargando...</div></div></div>';
      document.body.appendChild(o);
      if(todosContactosCache) renderContactosNuevo(todosContactosCache); else api("getTodosContactos").then(function(d){todosContactosCache=d;renderContactosNuevo(d);});
      document.getElementById('buscarContactoNuevo').focus();
    }
    function renderContactosNuevo(cs) {
      var l=document.getElementById('listaContactosNuevo'); if(!l)return; var h='';
      cs.forEach(function(c){ h+='<div class="contactos-panel-item" onclick="iniciarChatNuevo(\''+c.nombre.replace(/'/g,"\\'")+'\',\''+(c.telefono||'').replace(/'/g,"\\'")+'\')"><div><div class="contactos-panel-nombre">'+c.alias+'</div>'+(c.telefono?'<span class="contactos-panel-tel">'+c.telefono+'</span>':'<span class="contactos-panel-sin-tel">Sin tel</span>')+'</div></div>'; });
      l.innerHTML = h || '<div class="loading">No hay contactos</div>';
    }
    function filtrarContactosNuevo() { if(!todosContactosCache)return; var f=document.getElementById('buscarContactoNuevo').value.toLowerCase(); renderContactosNuevo(todosContactosCache.filter(function(c){return c.nombre.toLowerCase().indexOf(f)>-1||c.alias.toLowerCase().indexOf(f)>-1||c.telefono.indexOf(f)>-1;})); }
    
    function iniciarChatNuevo(contacto, telefono) {
      cerrarModal(); if(!telefono){mostrarToast('Sin teléfono');return;}
      contactoActual=contacto; telefonoActual=telefono;
      document.getElementById('welcomeScreen').style.display='none';
      document.getElementById('activeChat').style.display='flex';
      document.getElementById('appContainer').classList.add('chat-open');
      var c=todosContactosCache?todosContactosCache.find(function(x){return x.nombre===contacto;}):null;
      document.getElementById('chatName').textContent=c?c.alias:contacto;
      document.getElementById('chatAvatar').textContent=(c?c.alias:contacto).charAt(0).toUpperCase();
      document.getElementById('chatStatus').textContent='Nueva conversación';
      document.getElementById('chatPhone').textContent=telefono;
      document.getElementById('chatMessages').innerHTML='<div class="loading" style="color:#8696A0;">Escribí un mensaje para iniciar la conversación</div>';
      document.getElementById('suggestionsBar').innerHTML='';
      document.getElementById('messageInput').focus();
    }
    
    function toggleAutoIA() {
      autoIAactivo=!autoIAactivo; var b=document.getElementById('btnAutoIA');
      if(autoIAactivo){b.style.background='#7C3AED';b.style.color='white';b.style.borderColor='#7C3AED';mostrarToast('🤖 Auto IA activada');}
      else{b.style.background='none';b.style.color='#8696A0';b.style.borderColor='#2A3942';mostrarToast('🤖 Auto IA desactivada');}
      api("setAutoIA",{valor:autoIAactivo.toString()});
    }
    
    function sincTelefonos() {
      var o=document.createElement('div'); o.className='modal-overlay';
      o.innerHTML='<div class="modal-box"><div class="modal-title">📱 Sincronizar</div><div class="modal-subtitle">Buscar teléfonos en Google Contacts.</div><div class="modal-buttons"><button class="modal-btn modal-btn-cancel" onclick="cerrarModal()">Cancelar</button><button class="modal-btn modal-btn-ok" onclick="confirmarSync()">Sincronizar</button></div></div>';
      document.body.appendChild(o);
    }
    function confirmarSync() { cerrarModal(); var b=document.getElementById('btnSync'); b.textContent='⏳'; b.disabled=true; api("sincronizarTelefonos").then(function(r){b.textContent='📱';b.disabled=false;mostrarToast(r.actualizados+' actualizados');}).catch(function(){b.textContent='📱';b.disabled=false;mostrarToast('Error');}); }
    
    setInterval(function() {
      api("getContactos").then(function(d) { contactosGlobal=d; if(document.getElementById('searchInput').value==='') renderContactos(d); else filtrarContactos(); });
      if(contactoActual) api("getMensajesPorContacto",{contacto:contactoActual}).then(renderMensajes);
    }, 15000);
    
    function volverAContactos() { document.getElementById('appContainer').classList.remove('chat-open'); }
  </script>
